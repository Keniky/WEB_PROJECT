<div class="product_card_item">
  <div class="top">
    <div class="card-image"></div>
    <img class="card-heart" src="../../../../Assets/Icons/heart.svg" />
  </div>
  <div class="buttom">
    <div class="card-content">
      <h3 class="card-title">Put the name of your product here and don’t forget it has a limit..</h3>
      <div class="card-price">
        <span class="price-new">$12.99</span>
        <span class="price-old">$15.99</span>
      </div>
      <div class="card-rating">
        <span class="stars">★★★☆☆</span>
        <span class="reviews">(2k)</span>
      </div>
    </div>
    <div class="card-actions">
      <div class="btn-enabled icon-btn  icon-btn-secondary" style="height: 30px; width: 30px;">
        <img src="../../../../Assets/Icons/shopping-cart.svg" />
      </div>
    </div>
  </div>
</div>
