<header class="navbar">

  <!-- Top Bar -->
  <div class="navbar__top">
    <p>Welcome to ShopPal online eCommerce store.</p>

    <div class="navbar__social">
      <span>Join Us:</span>
      <a href="#"><img src="../../assets/icons/youtube.svg" class="icon"></a>
      <a href="#"><img src="../../assets/icons/facebook.svg" class="icon"></a>
      <a href="#"><img src="../../assets/icons/twitter.svg" class="icon"></a>
      <a href="#"><img src="../../assets/icons/instagram.svg" class="icon"></a>
      <a href="#"><img src="../../assets/icons/linkedin.svg" class="icon"></a>
    </div>
  </div>

  <!-- Main Bar -->
  <div class="navbar__main">

    <!-- Logo -->
    <div class="navbar__logo">
      <img src="WEB_PROJECT/Components/images/ShopPal-Logo.png" alt="ShopPal">
    </div>

    <!-- Search -->
    <div class="navbar__search">
      <select class="search__category">
        <option>All Items</option>
      </select>

      <input type="text" placeholder="Search">

      <button class="search__btn">
        🔍
      </button>
    </div>

    <!-- Actions -->
    <div class="navbar__actions">
      <a href="#"><img src="../../assets/icons/cart.svg" class="icon"></a>
      <a href="#"><img src="../../assets/icons/heart.svg" class="icon"></a>
      <a href="#"><img src="../../assets/icons/user.svg" class="icon"></a>
    </div>

    <!-- Mobile Menu Button -->
    <button class="navbar__toggle">☰</button>

  </div>

  <!-- Bottom Bar -->
  <div class="navbar__bottom">
    <button class="category-btn">All Categories ▼</button>
    <div class="support">🎧 Support</div>
  </div>

</header>
