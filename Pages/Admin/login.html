<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8"/>
        <title>ShopPal Login Page</title>
        <link rel="stylesheet" href="login.css"/>
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <link rel="stylesheet" href="../../Design_System/css/variables.css"/>
        <link rel="stylesheet" href="../../Components/Shared/icons.css">
        <link rel="stylesheet" href="../../Design_System/css/fonts.css"/>
        <link rel="stylesheet" href="../../Components/Shared/input.css"/>
    </head>

    <body>
        <div class="login" >
            <div class="shop-logo"></div>
            <h1>Sign In</h1>
            <div class="info-area">
                <label>Email Address </label>
                <div class = "text-input">
                    <i class = "material-icons">visibility</i>
                    <input type="text" id = "text-input" placeholder="Please Enter your text"> 
                </div>
                
                <label>Password</label>
                <div class = "text-input">
                    <i class = "material-icons">visibility</i>
                    <input type="password" id = "text-input" placeholder="Please Enter your text">
                    <span>
                        <input type="checkbox" checked class = "password-i">
                        <i class = "material-icons password-i">visibility</i> 
                    </span>
                </div>
                <a id="forgot-password" href="aa" target="_blank">Forgot Password?</a>
            </div>
            <a href="dashboard.html" target="_self" class="sign-in">
                    <span>Send</span>
                    <img src="../../Assets/Icons/chevron-right.svg">
            </a>
        </div>
    </body>

</html>
