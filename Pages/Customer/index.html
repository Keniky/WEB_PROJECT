<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Components/Shared/buttons.css">
  <link rel="stylesheet" href="../../Components/Customer/navbar/navbar.css">
  <link rel="stylesheet" href="../../Components/Customer/footer/footer.css">
  <link rel="stylesheet" href="../../Design_System/css/variables.css">
  <title>Test</title>
</head>

<body>
  <header class="navbar">

    <!-- Top Bar -->
    <div class="navbar__top">
      <p>Welcome to ShopPal online eCommerce store.</p>

      <div class="navbar__social">
        <span>Join Us:</span>
        <a href="#"><img src="../../assets/icons/youtube.svg" class="icon"></a>
        <a href="#"><img src="../../assets/icons/facebook.svg" class="icon"></a>
        <a href="#"><img src="../../assets/icons/twitter.svg" class="icon"></a>
        <a href="#"><img src="../../assets/icons/instagram.svg" class="icon"></a>
        <a href="#"><img src="../../assets/icons/linkedin.svg" class="icon"></a>
      </div>
    </div>

    <!-- Main Bar -->
    <div class="navbar__main">

      <!-- Logo -->
      <div class="navbar__logo">
        <img src="../../assets/images/logo.png" alt="ShopPal">
      </div>

      <!-- Search -->
      <div class="navbar__search">
        <select class="search__category">
          <option>All Items</option>
        </select>

        <input type="text" placeholder="Search">

        <button class="search__btn">
          🔍
        </button>
      </div>

      <!-- Actions -->
      <div class="navbar__actions">
        <a href="#"><img src="../../assets/icons/cart.svg" class="icon"></a>
        <a href="#"><img src="../../assets/icons/heart.svg" class="icon"></a>
        <a href="#"><img src="../../assets/icons/user.svg" class="icon"></a>
      </div>

      <!-- Mobile Menu Button -->
      <button class="navbar__toggle">☰</button>

    </div>

    <!-- Bottom Bar -->
    <div class="navbar__bottom">
      <button class="category-btn">All Categories ▼</button>
      <div class="support">🎧 Support</div>
    </div>

  </header>


  <footer class="footer">

    <div class="footer__top">

      <div class="footer__logo">
        <img src="../../assets/images/logo.png" alt="ShopPal">
      </div>

      <div class="footer__columns">

        <div class="footer__col">
          <h4>Shop</h4>
          <a href="#">All Products</a>
          <a href="#">New Arrivals</a>
          <a href="#">Best Sellers</a>
          <a href="#">Gift Ideas</a>
        </div>

        <div class="footer__col">
          <h4>Customer Service</h4>
          <a href="#">Contact Us</a>
          <a href="#">FAQs</a>
          <a href="#">Shipping & Returns</a>
        </div>

        <div class="footer__col">
          <h4>About</h4>
          <a href="#">About Us</a>
          <a href="#">Our Story</a>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms</a>
        </div>

        <!-- Social -->
        <div class="footer__col">
          <h4>Join Us</h4>
          <div class="footer__social">
            <img src="../../assets/icons/youtube.svg" class="icon">
            <img src="../../assets/icons/facebook.svg" class="icon">
            <img src="../../assets/icons/twitter.svg" class="icon">
            <img src="../../assets/icons/instagram.svg" class="icon">
            <img src="../../assets/icons/linkedin.svg" class="icon">
          </div>
        </div>

      </div>

    </div>

    <div class="footer__bottom">
      <p>CompanyName © 202X. All rights reserved.</p>
    </div>

  </footer>
</body>

</html>
