<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Components/Shared/buttons.css">
  <link rel="stylesheet" href="../../Components/Shared/iconbuttons.css">
  <link rel="stylesheet" href="../../Components/Customer/navbar/navbar.css">
  <link rel="stylesheet" href="../../Components/Customer/footer/footer.css">
  <link rel="stylesheet" href="../../Components/Customer/product_cards/cards.css">
  <link rel="stylesheet" href="../../Design_System/css/variables.css">
  <title>Test</title>
</head>

<body>
  <div class="card card-sm">
    <div class="card-image"><img src="" alt=""></div>
    <div class="card-rating">
      <span class="stars">★★★☆☆</span>
      <span class="reviews">(2k)</span>
    </div>
    <div class="card-content">
      <h3 class="card-title">Put the name of your product here and don’t forget it has a limit..</h3>
      <p class="card-description">Put the description of your product here and don’t forget it has a limit..</p>
    </div>
    <div class="card-price">
      <span class="price-new">$12.99</span>
      <span class="price-old">$12.99</span>
    </div>
    <div class="card-actions">
      <div class="btn-enabled icon-btn  icon-btn-secondary">
        <img src="../../assets/icons/cart.svg">
      </div>
      <span class="card-heart">♥</span>
    </div>
  </div>

</body>

</html>
